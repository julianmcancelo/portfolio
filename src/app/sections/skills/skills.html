<section id="skills" class="skills">
  <div class="skills-inner">
    <div class="skills-header reveal">
      <p class="eyebrow">{{ i18n.t().skills.eyebrow }}</p>
      <h2 class="headline">{{ i18n.t().skills.headline }}</h2>
    </div>
    <div class="skills-grid">
      <div
        class="skill-group reveal"
        *ngFor="let g of i18n.t().skills.groups; let i = index"
        [style.transition-delay]="(i * 0.07) + 's'"
      >
        <p class="group-label">{{ g.label }}</p>
        <div class="group-items">
          <span class="pill" data-stagger *ngFor="let item of g.items">{{ item }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
